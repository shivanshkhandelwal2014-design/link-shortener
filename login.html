<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLink - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #020617; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(6, 182, 212, 0.1);
        }
        .glow {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);
        }
        .gradient-text {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Animated background -->
    <div class="fixed inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse animation-delay-2000"></div>
    </div>

    <div class="glass-card rounded-2xl p-8 w-full max-w-md relative glow animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold gradient-text">SmartLink</h1>
            <p class="text-gray-400 mt-2">Secure Link Management</p>
        </div>

        <!-- Login Form -->
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    <i class="fas fa-lock text-cyan-400 mr-2"></i>Password
                </label>
                <input type="password" id="password" 
                    class="w-full px-4 py-3 bg-white/5 border border-gray-700 rounded-xl focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 text-white outline-none transition-all"
                    placeholder="Enter password">
            </div>

            <button id="loginBtn" 
                class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-xl font-semibold hover:from-cyan-600 hover:to-blue-700 transition-all transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-opacity-50 flex items-center justify-center gap-2">
                <i class="fas fa-arrow-right-to-bracket"></i>
                Unlock Dashboard
            </button>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/30 rounded-lg p-3">
                <p class="text-red-400 text-sm text-center">
                    <i class="fas fa-exclamation-circle mr-2"></i>Invalid password. Try again.
                </p>
            </div>
        </div>

        <!-- Hint -->
        <p class="text-gray-500 text-sm text-center mt-6">
            Hint: Use "admin123" to access
        </p>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', () => {
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            if (password === 'admin123') {
                // Add animation before redirect
                document.querySelector('.glass-card').style.transform = 'scale(0.95)';
                document.querySelector('.glass-card').style.opacity = '0';
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 300);
            } else {
                errorMessage.classList.remove('hidden');
                document.getElementById('password').classList.add('border-red-500');
                setTimeout(() => {
                    errorMessage.classList.add('hidden');
                    document.getElementById('password').classList.remove('border-red-500');
                }, 3000);
            }
        });

        // Enter key support
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</body>
</html>
