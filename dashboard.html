<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLink - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #020617; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(6, 182, 212, 0.1);
        }
        .glow {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <!-- Animated background -->
    <div class="fixed inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse animation-delay-2000"></div>
    </div>

    <!-- Main Content -->
    <div class="relative max-w-7xl mx-auto">
        <!-- Header -->
        <header class="glass-card rounded-2xl p-4 mb-6 flex justify-between items-center glow">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl md:text-3xl font-bold gradient-text">SmartLink</h1>
                <span class="px-3 py-1 bg-cyan-500/10 text-cyan-400 text-sm rounded-full border border-cyan-500/20">
                    <i class="fas fa-shield-alt mr-1"></i>Secure
                </span>
            </div>
            <button id="logoutBtn" 
                class="px-4 py-2 bg-white/5 hover:bg-white/10 text-gray-300 rounded-xl transition-all flex items-center gap-2 border border-gray-700 hover:border-cyan-400">
                <i class="fas fa-sign-out-alt text-cyan-400"></i>
                Logout
            </button>
        </header>

        <!-- Main Card -->
        <div class="glass-card rounded-2xl p-6 md:p-8 mb-6 glow animate-slide-up">
            <h2 class="text-2xl font-semibold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-link text-cyan-400"></i>
                Shorten Your Link
            </h2>

            <div class="space-y-4">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="url" id="longUrl" 
                        class="flex-1 px-4 py-3 bg-white/5 border border-gray-700 rounded-xl focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 text-white outline-none transition-all"
                        placeholder="Enter your long URL here...">
                    <button id="shortenBtn" 
                        class="px-6 py-3 gradient-bg text-white rounded-xl font-semibold hover:opacity-90 transition-all transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-400 flex items-center justify-center gap-2 whitespace-nowrap">
                        <i class="fas fa-magic"></i>
                        Generate Short Link
                    </button>
                </div>

                <!-- Result Section -->
                <div id="resultSection" class="hidden mt-6 p-4 bg-white/5 rounded-xl border border-cyan-500/20 animate-fade-in">
                    <p class="text-sm text-gray-400 mb-2">Your shortened link:</p>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="shortUrl" readonly 
                            class="flex-1 px-3 py-2 bg-white/10 border border-gray-700 rounded-lg text-cyan-400 font-mono text-sm"
                            value="">
                        <button id="copyBtn" 
                            class="px-4 py-2 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 rounded-lg transition-all flex items-center justify-center gap-2 border border-cyan-500/30">
                            <i class="fas fa-copy"></i>
                            Copy
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Link History Table -->
        <div class="glass-card rounded-2xl p-6 md:p-8 glow">
            <h3 class="text-xl font-semibold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-history text-blue-400"></i>
                Recent Links
            </h3>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-gray-400 text-sm border-b border-gray-700">
                            <th class="pb-3 font-medium">Original URL</th>
                            <th class="pb-3 font-medium">Short URL</th>
                            <th class="pb-3 font-medium">Copy</th>
                            <th class="pb-3 font-medium">Date</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody" class="text-gray-300">
                        <!-- Links will be inserted here via JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="text-center py-8">
                <i class="fas fa-spinner fa-spin text-cyan-400 text-2xl"></i>
                <p class="text-gray-400 mt-2">Loading links...</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-8">
                <i class="fas fa-link-slash text-gray-600 text-4xl mb-3"></i>
                <p class="text-gray-400">No links yet. Create your first shortened link!</p>
            </div>
        </div>
    </div>

    <!-- Copy Notification -->
    <div id="copyNotification" class="fixed bottom-4 right-4 bg-green-500/90 text-white px-4 py-2 rounded-lg shadow-lg transform transition-all translate-y-20 opacity-0">
        <i class="fas fa-check-circle mr-2"></i>
        Copied to clipboard!
    </div>

    <script src="script.js"></script>

    <style>
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-up {
            animation: slide-up 0.5s ease-out;
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</body>
</html>
